<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST Sports - Admin Returns & Losses</title>
    <style>
        :root {
            --primary: #1a3b5c; /* FAST University Blue */
            --secondary: #29507a;
            --accent: #e53935; /* Red for fines/losses */
            --bg: #f4f7f6;
            --text: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        h1, h2 { color: var(--primary); text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: var(--secondary); }
        .btn-danger { background-color: var(--accent); }
        .btn-danger:hover { background-color: #c62828; }
        .return-item { background: #f9f9f9; padding: 15px; border-left: 5px solid var(--primary); margin-bottom: 15px; border-radius: 4px; }
        .row { display: flex; gap: 10px; margin-top: 10px; }
        .row > div { flex: 1; }
        #loadingMsg { text-align: center; color: var(--primary); font-weight: bold; display: none; margin-top: 10px; }
        hr { border: 0; height: 1px; background: #eee; margin: 30px 0; }
    </style>
</head>
<body>

    <h1>FAST Sports Administration</h1>

    <div class="container">
        <h2>Process Student Returns</h2>
        <p style="text-align:center; font-size: 14px; color: #666;">Scan or type the student's Roll Number to process returned items.</p>
        
        <div class="form-group">
            <label for="rollNumber">Student Roll Number (e.g., 21F-1234):</label>
            <input type="text" id="rollNumber" placeholder="Enter Roll Number...">
        </div>
        <button onclick="fetchOpenTransactions()">Find Open Items</button>
        <p id="loadingMsg">Loading data from system...</p>

        <div id="openItemsContainer" style="margin-top: 20px;">
            </div>

        <button id="submitReturnsBtn" style="display:none; margin-top: 20px; background-color: #2e7d32;" onclick="submitReturns()">Process Selected Returns</button>
    </div>

    <div class="container" style="border-top: 5px solid var(--accent);">
        <h2 style="color: var(--accent);">Mark Office Item Loss</h2>
        <p style="text-align:center; font-size: 14px; color: #666;">Use this if an item goes missing directly from the sports office (No student fine applied).</p>
        
        <div class="form-group">
            <label for="lossItemName">Item Name (Exact match from Inventory):</label>
            <input type="text" id="lossItemName" placeholder="e.g., Cricket Bat">
        </div>
        <div class="form-group">
            <label for="lossQty">Quantity Lost:</label>
            <input type="number" id="lossQty" min="1" value="1">
        </div>
        <button class="btn-danger" onclick="markOfficeLoss()">Report Office Loss</button>
    </div>

    <script>
        // ⚠️ REPLACE THIS WITH YOUR NEW "WEB APP URL" FROM APPS SCRIPT
        const SCRIPT_URL = "YOUR_WEB_APP_URL_HERE"; 
        
        let currentOpenItems = [];

        // --- FETCH STUDENT OPEN ITEMS ---
        async function fetchOpenTransactions() {
            const rollNo = document.getElementById('rollNumber').value.trim();
            if (!rollNo) return alert("Please enter a Roll Number");

            document.getElementById('loadingMsg').style.display = "block";
            document.getElementById('openItemsContainer').innerHTML = "";
            document.getElementById('submitReturnsBtn').style.display = "none";

            try {
                const response = await fetch(`${SCRIPT_URL}?action=apiGetOpenTransactions&rollNo=${rollNo}`);
                const data = await response.json();
                
                document.getElementById('loadingMsg').style.display = "none";

                if (data.success && data.items.length > 0) {
                    currentOpenItems = data.items;
                    let html = `<h3>Items currently issued to ${rollNo}:</h3>`;
                    
                    data.items.forEach((item, index) => {
                        html += `
                        <div class="return-item">
                            <strong>${item.itemName}</strong> (Qty Issued: ${item.qty}) <br>
                            <span style="font-size:12px; color:#555;">Transaction ID: ${item.transactionId}</span>
                            
                            <div class="row">
                                <div>
                                    <label>Return Qty:</label>
                                    <input type="number" id="retQty_${index}" max="${item.qty}" min="0" value="${item.qty}">
                                </div>
                                <div>
                                    <label>Condition:</label>
                                    <select id="retCondition_${index}">
                                        <option value="Good">Good</option>
                                        <option value="Consumed">Consumed (e.g., Shuttlecock)</option>
                                        <option value="Damaged">Damaged</option>
                                        <option value="Lost">Lost by Student</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Fine Amount (PKR):</label>
                                    <input type="number" id="retFine_${index}" value="0" min="0">
                                </div>
                            </div>
                        </div>`;
                    });
                    
                    document.getElementById('openItemsContainer').innerHTML = html;
                    document.getElementById('submitReturnsBtn').style.display = "block";
                } else {
                    document.getElementById('openItemsContainer').innerHTML = `<p style="color:red; text-align:center;">No open transactions found for this student.</p>`;
                }
            } catch (error) {
                alert("Error connecting to server. Make sure you replaced the SCRIPT_URL.");
                document.getElementById('loadingMsg').style.display = "none";
            }
        }

        // --- SUBMIT STUDENT RETURNS & FINES ---
        async function submitReturns() {
            const rollNo = document.getElementById('rollNumber').value.trim();
            let returnsArray = [];

            currentOpenItems.forEach((item, index) => {
                let rQty = parseInt(document.getElementById(`retQty_${index}`).value);
                let cond = document.getElementById(`retCondition_${index}`).value;
                let fine = parseInt(document.getElementById(`retFine_${index}`).value) || 0;

                if (rQty > 0) {
                    returnsArray.push({
                        transactionId: item.transactionId,
                        itemId: item.itemId,
                        qty: rQty,
                        condition: cond,
                        fineAmount: fine
                    });
                }
            });

            if (returnsArray.length === 0) return alert("No items selected to return.");

            document.getElementById('submitReturnsBtn').innerText = "Processing...";
            
            try {
                const response = await fetch(`${SCRIPT_URL}?action=apiProcessReturns&rollNo=${rollNo}&returns=${encodeURIComponent(JSON.stringify(returnsArray))}`);
                const data = await response.json();
                
                if(data.success) {
                    alert("✅ " + data.message);
                    document.getElementById('openItemsContainer').innerHTML = "";
                    document.getElementById('submitReturnsBtn').style.display = "none";
                    document.getElementById('rollNumber').value = "";
                } else {
                    alert("❌ Error: " + data.message);
                }
            } catch (error) {
                alert("Error processing returns.");
            }
            document.getElementById('submitReturnsBtn').innerText = "Process Selected Returns";
        }

        // --- MARK OFFICE LOSS (NEW API) ---
        async function markOfficeLoss() {
            const itemName = document.getElementById('lossItemName').value.trim();
            const qty = document.getElementById('lossQty').value;

            if (!itemName || qty <= 0) return alert("Please enter a valid item name and quantity.");

            if(confirm(`Are you sure you want to mark ${qty}x ${itemName} as lost from the office? This cannot be undone.`)) {
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=apiMarkOfficeLoss&itemName=${encodeURIComponent(itemName)}&qty=${qty}`);
                    const data = await response.json();
                    
                    if(data.success) {
                        alert("✅ " + data.message);
                        document.getElementById('lossItemName').value = "";
                        document.getElementById('lossQty').value = "1";
                    } else {
                        alert("❌ Error: " + data.message);
                    }
                } catch (error) {
                    alert("Error communicating with server.");
                }
            }
        }
    </script>
</body>
</html>
