<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Inventory Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f4f7f6; padding-top: 20px; }
    .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .student-info { display: none; background-color: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 15px; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; overflow: hidden; border-radius: 8px; border: 2px solid #0d6efd; }
  </style>
</head>
<body>

<div class="container">
  <h2 class="text-center text-primary mb-4">University Sports Inventory</h2>

  <div class="card p-3">
    <h5 class="card-title text-center mb-3">Live QR Scanner</h5>
    
    <div id="reader" class="mb-3"></div>
    
    <div class="text-center my-3"><strong>OR</strong></div>
    
    <div class="input-group mb-3">
      <input type="text" id="manualInput" class="form-control" placeholder="e.g. 26M-1234">
      <button class="btn btn-primary" onclick="processInput()">Search</button>
    </div>
    
    <div id="loading" class="text-center text-secondary" style="display: none;">
      <div class="spinner-border spinner-border-sm" role="status"></div> Fetching from Database...
    </div>
  </div>

  <div id="studentProfile" class="card p-3 student-info text-start">
    <h5 class="text-success mb-3">Student Profile Found</h5>
    <p><strong>Name:</strong> <span id="sName"></span></p>
    <p><strong>Roll No:</strong> <span id="sRoll"></span></p>
    <p><strong>Email:</strong> <span id="sEmail"></span></p>
    <p><strong>Account Status:</strong> <span id="sStatus" class="badge"></span></p>
    <hr>
    <div class="d-flex justify-content-around mt-3">
      <button class="btn btn-success" onclick="alert('Issue Item logic coming next!')">Issue Item</button>
      <button class="btn btn-warning" onclick="alert('Return Item logic coming next!')">Return Item</button>
    </div>
  </div>
</div>

<script>
  // PASTE YOUR APPS SCRIPT WEB APP URL BETWEEN THE QUOTES BELOW:
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2dOuheToKqt3CjGcqmKkU-_g1MrchV_QRxyg-DeI_kYRsWWlzPxaSqF_S4BT7A264_Q/exec";

  // 1. Initialize Live Scanner
  let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} });
  
  function onScanSuccess(decodedText, decodedResult) {
    // Pause scanner so it doesn't scan the same code 100 times
    html5QrcodeScanner.pause(true); 
    document.getElementById("manualInput").value = decodedText;
    processInput();
  }
  
  html5QrcodeScanner.render(onScanSuccess);

  // 2. Fetch Data from Google Sheets API
  function processInput() {
    const qrData = document.getElementById("manualInput").value.trim();
    if (!qrData) {
      alert("Please enter or scan a roll number.");
      return;
    }
    
    document.getElementById("loading").style.display = "block";
    document.getElementById("studentProfile").style.display = "none";

    // Call the Google Apps Script Backend
    fetch(APPS_SCRIPT_URL + "?qrData=" + encodeURIComponent(qrData))
      .then(response => response.json())
      .then(data => {
        updateUI(data);
        if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.PAUSED) {
            setTimeout(() => html5QrcodeScanner.resume(), 3000); // Resume scanner after 3 secs
        }
      })
      .catch(error => {
        document.getElementById("loading").style.display = "none";
        alert("Database Error. Check console or URL.");
        console.error(error);
      });
  }

  // 3. Update the Screen
  function updateUI(studentData) {
    document.getElementById("loading").style.display = "none";
    
    if (studentData.error) {
      alert(studentData.error);
      return;
    }

    document.getElementById("sName").innerText = studentData.name;
    document.getElementById("sRoll").innerText = studentData.rollNo;
    document.getElementById("sEmail").innerText = studentData.email;
    
    const statusBadge = document.getElementById("sStatus");
    statusBadge.innerText = studentData.accountStatus;
    statusBadge.className = studentData.accountStatus === "Active" ? "badge bg-success" : "badge bg-danger";

    document.getElementById("studentProfile").style.display = "block";
    
    if(!studentData.found) alert(studentData.message);
  }
</script>
</body>
</html>
