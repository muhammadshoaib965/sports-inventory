<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; }
        .uni-header { 
            background: #003366; color: white; text-align: center; padding: 20px; 
            border-bottom: 5px solid #d9534f; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .uni-logo { height: 70px; margin-bottom: 10px; filter: brightness(0) invert(1); }
        .main-card { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Login Overlay Styles */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,51,102,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000; color: white;
        }
        .login-box { background: white; padding: 30px; border-radius: 10px; color: #333; width: 80%; max-width: 350px; text-align: center; }
        input[type="text"], input[type="password"], select, input[type="number"] {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;
        }
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 6px; 
            cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px;
        }
        .btn-primary { background: #003366; color: white; }
        .btn-view { background: #6c757d; color: white; margin-top: 20px; }
        
        .admin-only { display: none; } /* Hidden by default */
    </style>
</head>
<body>

<div id="login-overlay">
    <img src="https://www.nu.edu.pk/Content/images/Logo.png" class="uni-logo" alt="FAST Logo">
    <div class="login-box">
        <h3>Admin Portal</h3>
        <input type="text" id="adminUser" placeholder="Username">
        <input type="password" id="adminPass" placeholder="Password">
        <button class="btn btn-primary" onclick="checkLogin()">Login as Admin</button>
        <hr>
        <button class="btn btn-view" onclick="enterViewOnly()">Public View Only</button>
    </div>
</div>

<div class="uni-header">
    <img src="https://www.nu.edu.pk/Content/images/Logo.png" class="uni-logo" alt="FAST Logo">
    <h1 style="font-size: 20px; margin: 0;">National University of Computer and Emerging Sciences</h1>
    <p style="margin: 5px 0; opacity: 0.9;">Multan Campus</p>
    <h2 style="font-size: 16px; margin-top: 10px; color: #ffc107;">Sports Inventory Management System</h2>
</div>

<div class="main-card">
    <div id="restock-section" class="admin-only">
        <h3>📦 Add/Restock Inventory</h3>
        <select id="restockType" onchange="toggleNewItemField()">
            <option value="existing">Restock Existing Item</option>
            <option value="new">Add Completely New Item</option>
        </select>
        <div id="existing-item-list">
             <select id="itemSelect"></select>
        </div>
        <div id="new-item-input" style="display:none;">
            <input type="text" id="newItemName" placeholder="Enter New Item Name">
        </div>
        <input type="number" id="restockQty" placeholder="Quantity">
        <button class="btn btn-primary" onclick="submitRestock()">Update Inventory</button>
    </div>

    </div>

<script>
    let isAdmin = false;

    function checkLogin() {
        const u = document.getElementById('adminUser').value;
        const p = document.getElementById('adminPass').value;
        
        // Call backend to verify
        google.script.run.withSuccessHandler(function(res) {
            let data = JSON.parse(res);
            if(data.success) {
                isAdmin = true;
                document.getElementById('login-overlay').style.display = 'none';
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                alert("Welcome, Admin!");
            } else {
                alert("Invalid Login!");
            }
        }).adminLogin(u, p);
    }

    function enterViewOnly() {
        isAdmin = false;
        document.getElementById('login-overlay').style.display = 'none';
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        // Load inventory for viewing
        loadInventory();
    }

    function toggleNewItemField() {
        const type = document.getElementById('restockType').value;
        document.getElementById('existing-item-list').style.display = (type === 'existing' ? 'block' : 'none');
        document.getElementById('new-item-input').style.display = (type === 'new' ? 'block' : 'none');
    }

    function submitRestock() {
        const type = document.getElementById('restockType').value;
        const qty = document.getElementById('restockQty').value;
        const name = (type === 'existing') ? document.getElementById('itemSelect').value : document.getElementById('newItemName').value;
        
        google.script.run.withSuccessHandler(function(res) {
            alert(JSON.parse(res).message);
            location.reload(); // Refresh to show new stock
        }).restockItem(name, qty, (type === 'new'));
    }
</script>
</body>
</html>

<script>
  // PASTE YOUR APPS SCRIPT WEB APP URL HERE
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrNylfB-I4dw2tFFBn0RWBJX-JVgRJlD-15K9-TBq_1UcSi2B2VWEa93SE5XRrdaz0Sg/exec";

  let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} });
  let cart = []; 
  let openTransactions = [];
  let globalInventory = []; // Stores detailed inventory

  function onScanSuccess(decodedText) {
    html5QrcodeScanner.pause(true); 
    document.getElementById("manualInput").value = decodedText;
    processStudentInput();
  }
  html5QrcodeScanner.render(onScanSuccess);

  function processStudentInput() {
    const qrData = document.getElementById("manualInput").value.trim();
    if (!qrData) return alert("Please enter a roll number.");
    
    document.getElementById("loading").style.display = "block";
    document.getElementById("studentProfile").style.display = "none";
    document.getElementById("issueSection").style.display = "none";
    document.getElementById("returnSection").style.display = "none";

    fetch(APPS_SCRIPT_URL + "?action=getStudent&qrData=" + encodeURIComponent(qrData))
      .then(res => res.json())
      .then(data => {
        document.getElementById("loading").style.display = "none";
        if (data.error) return alert(data.error);

        let fines = parseInt(data.fines) || 0;
        
        document.getElementById("sName").innerText = data.name;
        document.getElementById("sRoll").innerText = data.rollNo;
        document.getElementById("sFines").innerText = fines;
        document.getElementById("sStatus").innerText = data.accountStatus;
        document.getElementById("sStatus").className = data.accountStatus === "Active" ? "badge bg-success" : "badge bg-danger";
        
        // 1. FINE PAYMENT BUTTON LOGIC
        document.getElementById("payFineBtn").style.display = fines > 0 ? "inline-block" : "none";

        // 2. BLOCKING LOGIC
        if (data.accountStatus !== "Active" || fines > 0) {
          document.getElementById("issueNavBtn").disabled = true;
          document.getElementById("blockWarning").style.display = "block";
        } else {
          document.getElementById("issueNavBtn").disabled = false;
          document.getElementById("blockWarning").style.display = "none";
        }

        document.getElementById("studentProfile").style.display = "block";
        if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.PAUSED) setTimeout(() => html5QrcodeScanner.resume(), 3000);
      }).catch(err => { document.getElementById("loading").style.display = "none"; alert("Database Error."); });
  }

  function payFines() {
    if(!confirm("Are you sure you want to clear this student's fines? Did you receive the cash?")) return;
    document.getElementById("loading").style.display = "block";
    const rollNo = document.getElementById("sRoll").innerText;

    fetch(APPS_SCRIPT_URL + "?action=payFine&rollNo=" + encodeURIComponent(rollNo))
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          alert("Fines cleared successfully!");
          processStudentInput(); // Refresh profile
        }
      });
  }

  function showIssueSection() {
    document.getElementById("issueSection").style.display = "block";
    document.getElementById("returnSection").style.display = "none";
    document.getElementById("loading").style.display = "block";
    cart = []; renderCart();
    document.getElementById("stockWarning").style.display = "none";

    fetch(APPS_SCRIPT_URL + "?action=getInventory")
      .then(res => res.json())
      .then(data => {
        document.getElementById("loading").style.display = "none";
        if (data.success && data.items) {
          globalInventory = data.items;
          const datalist = document.getElementById("inventoryList"); datalist.innerHTML = ""; 
          data.items.forEach(item => { let option = document.createElement("option"); option.value = item.name; datalist.appendChild(option); });
        }
      });
  }

  function checkStockWarning() {
    const itemName = document.getElementById("selectedItem").value;
    const itemData = globalInventory.find(i => i.name === itemName);
    const warningBox = document.getElementById("stockWarning");
    
    // 3. LOW STOCK ALERT LOGIC
    if (itemData && itemData.available <= itemData.threshold) {
      warningBox.innerText = `Low Stock Alert: Only ${itemData.available} ${itemName} left in inventory!`;
      warningBox.style.display = "block";
    } else {
      warningBox.style.display = "none";
    }
  }

  function addToCart() {
    const itemName = document.getElementById("selectedItem").value.trim();
    const qty = parseInt(document.getElementById("selectedQty").value);
    if (!itemName || qty < 1) return alert("Invalid item/qty");
    const existing = cart.findIndex(i => i.itemName === itemName);
    if (existing > -1) cart[existing].qty += qty; else cart.push({ itemName, qty });
    document.getElementById("selectedItem").value = ""; document.getElementById("selectedQty").value = "1"; 
    document.getElementById("stockWarning").style.display = "none";
    renderCart();
  }
  
  function removeFromCart(index) { cart.splice(index, 1); renderCart(); }
  
  function renderCart() {
    const tbody = document.getElementById("cartBody"); tbody.innerHTML = "";
    if (cart.length === 0) { document.getElementById("cartTable").style.display = "none"; document.getElementById("checkoutBtn").style.display = "none"; return; }
    cart.forEach((item, index) => { tbody.innerHTML += `<tr><td>${item.itemName}</td><td>${item.qty}</td><td><button class="btn btn-sm btn-danger" onclick="removeFromCart(${index})">X</button></td></tr>`; });
    document.getElementById("cartTable").style.display = "table"; document.getElementById("checkoutBtn").style.display = "block";
  }

  function submitCheckout() {
    if (cart.length === 0) return;
    document.getElementById("loading").style.display = "block";
    fetch(APPS_SCRIPT_URL + "?action=issueItems&rollNo=" + encodeURIComponent(document.getElementById("sRoll").innerText) + "&cartData=" + encodeURIComponent(JSON.stringify(cart)))
      .then(res => res.json())
      .then(data => { document.getElementById("loading").style.display = "none"; if (data.success) { alert(data.message); document.getElementById("issueSection").style.display = "none"; } else alert(data.message); });
  }

  // --- RETURN LOGIC (Kept exactly the same) ---
  function showReturnSection() {
    document.getElementById("returnSection").style.display = "block";
    document.getElementById("issueSection").style.display = "none";
    document.getElementById("loading").style.display = "block";
    const rollNo = document.getElementById("sRoll").innerText;

    fetch(APPS_SCRIPT_URL + "?action=getOpenTransactions&rollNo=" + encodeURIComponent(rollNo))
      .then(res => res.json())
      .then(data => {
        document.getElementById("loading").style.display = "none";
        openTransactions = data.items || [];
        renderReturnTable();
      }).catch(err => { document.getElementById("loading").style.display = "none"; alert("Error fetching returns."); });
  }

  function renderReturnTable() {
    const tbody = document.getElementById("returnBody"); tbody.innerHTML = "";
    if (openTransactions.length === 0) { document.getElementById("noItemsMsg").style.display = "block"; document.getElementById("returnTable").style.display = "none"; document.getElementById("processReturnBtn").style.display = "none"; return; }
    document.getElementById("noItemsMsg").style.display = "none"; document.getElementById("returnTable").style.display = "table"; document.getElementById("processReturnBtn").style.display = "block";
    openTransactions.forEach((item, index) => {
      let tr = document.createElement("tr");
      tr.innerHTML = `<td><input class="form-check-input return-checkbox" type="checkbox" data-index="${index}"></td>
        <td>${item.itemName} (Qty: ${item.qty})<br><small class="text-muted">Due: ${item.dueDate}</small></td>
        <td><select class="form-select form-select-sm return-condition" id="cond_${index}" onchange="toggleFineInput(${index})"><option value="Good">Good</option><option value="Consumed">Consumed</option><option value="Damaged">Damaged</option></select></td>
        <td><input type="number" class="form-control form-control-sm" id="fine_${index}" placeholder="PKR 0" style="display:none;" min="0"></td>`;
      tbody.appendChild(tr);
    });
  }

  function toggleFineInput(index) {
    const condition = document.getElementById(`cond_${index}`).value;
    const fineInput = document.getElementById(`fine_${index}`);
    if (condition === "Damaged") { fineInput.style.display = "block"; } else { fineInput.style.display = "none"; fineInput.value = ""; }
  }

  function submitReturns() {
    const checkboxes = document.querySelectorAll('.return-checkbox:checked');
    if (checkboxes.length === 0) return alert("Please select at least one item to return.");
    let returnsToProcess = [], validationPassed = true;
    checkboxes.forEach(cb => {
      let index = cb.getAttribute('data-index'); let item = openTransactions[index]; let condition = document.getElementById(`cond_${index}`).value; let fineAmount = document.getElementById(`fine_${index}`).value;
      if (condition === "Damaged" && (!fineAmount || fineAmount <= 0)) { validationPassed = false; alert(`Please enter a fine amount for the damaged ${item.itemName}.`); }
      returnsToProcess.push({ transactionId: item.transactionId, itemId: item.itemId, qty: item.qty, condition: condition, fineAmount: fineAmount || 0 });
    });
    if (!validationPassed) return;
    document.getElementById("loading").style.display = "block";
    const rollNo = document.getElementById("sRoll").innerText;
    fetch(APPS_SCRIPT_URL + "?action=processReturns&rollNo=" + encodeURIComponent(rollNo) + "&returnData=" + encodeURIComponent(JSON.stringify(returnsToProcess)))
      .then(res => res.json())
      .then(data => { document.getElementById("loading").style.display = "none"; if (data.success) { alert("Returns processed!"); processStudentInput(); } else { alert("Error: " + data.message); } })
      .catch(err => { document.getElementById("loading").style.display = "none"; alert("Failed to process return."); });
  }
</script>
</body>
</html>
