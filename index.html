<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Inventory Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f4f7f6; padding-top: 20px; }
    .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .student-info, .issue-section { display: none; background-color: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 15px; }
    .issue-section { background-color: #f8f9fa; border: 1px solid #dee2e6; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; overflow: hidden; border-radius: 8px; border: 2px solid #0d6efd; }
    .cart-table th, .cart-table td { padding: 8px; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <h2 class="text-center text-primary mb-4">University Sports Inventory</h2>

  <div class="card p-3">
    <h5 class="card-title text-center mb-3">Live QR Scanner</h5>
    
    <div id="reader" class="mb-3"></div>
    <div class="text-center my-3"><strong>OR</strong></div>
    
    <div class="input-group mb-3">
      <input type="text" id="manualInput" class="form-control" placeholder="e.g. 26M-1234">
      <button class="btn btn-primary" onclick="processStudentInput()">Search</button>
    </div>
    
    <div id="loading" class="text-center text-secondary" style="display: none;">
      <div class="spinner-border spinner-border-sm" role="status"></div> Processing...
    </div>
  </div>

  <div id="studentProfile" class="card p-3 student-info text-start">
    <h5 class="text-success mb-3">Student Profile Found</h5>
    <p><strong>Name:</strong> <span id="sName"></span></p>
    <p><strong>Roll No:</strong> <span id="sRoll"></span></p>
    <p><strong>Account Status:</strong> <span id="sStatus" class="badge"></span></p>
    <hr>
    <div class="d-flex justify-content-around mt-3">
      <button class="btn btn-success" onclick="showIssueSection()">Issue Items</button>
      <button class="btn btn-warning" onclick="alert('Return coming next!')">Return Items</button>
    </div>
  </div>

  <div id="issueSection" class="card p-3 issue-section">
    <h5 class="mb-3 text-center">Checkout Cart</h5>
    
    <div class="row g-2 mb-3">
      <div class="col-8">
        <label class="form-label mb-1">Select Item:</label>
        <input class="form-control" list="inventoryList" id="selectedItem" placeholder="Search item...">
        <datalist id="inventoryList"></datalist>
      </div>
      <div class="col-4">
        <label class="form-label mb-1">Qty:</label>
        <input type="number" class="form-control" id="selectedQty" value="1" min="1">
      </div>
    </div>
    
    <button class="btn btn-outline-primary w-100 mb-3" onclick="addToCart()">+ Add to List</button>

    <table class="table table-bordered table-sm cart-table" id="cartTable" style="display: none;">
      <thead class="table-light">
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="cartBody"></tbody>
    </table>
    
    <button class="btn btn-success w-100 mt-2" id="checkoutBtn" style="display: none;" onclick="submitCheckout()">Confirm Checkout</button>
  </div>
</div>

<script>
  // PASTE YOUR APPS SCRIPT WEB APP URL HERE
  const APPS_SCRIPT_URL = "YOUR_WEB_APP_URL_HERE";

  let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} });
  let cart = []; // Array to hold multiple items

  function onScanSuccess(decodedText) {
    html5QrcodeScanner.pause(true); 
    document.getElementById("manualInput").value = decodedText;
    processStudentInput();
  }
  html5QrcodeScanner.render(onScanSuccess);

  // 1. Fetch Student
  function processStudentInput() {
    const qrData = document.getElementById("manualInput").value.trim();
    if (!qrData) return alert("Please enter a roll number.");
    
    document.getElementById("loading").style.display = "block";
    document.getElementById("studentProfile").style.display = "none";
    document.getElementById("issueSection").style.display = "none";

    fetch(APPS_SCRIPT_URL + "?action=getStudent&qrData=" + encodeURIComponent(qrData))
      .then(res => res.json())
      .then(data => {
        document.getElementById("loading").style.display = "none";
        if (data.error) return alert(data.error);

        document.getElementById("sName").innerText = data.name;
        document.getElementById("sRoll").innerText = data.rollNo;
        document.getElementById("sStatus").innerText = data.accountStatus;
        document.getElementById("sStatus").className = data.accountStatus === "Active" ? "badge bg-success" : "badge bg-danger";
        document.getElementById("studentProfile").style.display = "block";
        
        if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.PAUSED) {
            setTimeout(() => html5QrcodeScanner.resume(), 3000);
        }
      }).catch(err => {
        document.getElementById("loading").style.display = "none";
        alert("Database Error.");
      });
  }

  // 2. Show Issue Section & Fetch Inventory
  function showIssueSection() {
    document.getElementById("issueSection").style.display = "block";
    document.getElementById("loading").style.display = "block";
    cart = []; // Reset cart
    renderCart();
    
    fetch(APPS_SCRIPT_URL + "?action=getInventory")
      .then(res => res.json())
      .then(data => {
        document.getElementById("loading").style.display = "none";
        if (data.success && data.items) {
          const datalist = document.getElementById("inventoryList");
          datalist.innerHTML = ""; 
          data.items.forEach(item => {
            let option = document.createElement("option");
            option.value = item;
            datalist.appendChild(option);
          });
        }
      }).catch(err => {
        document.getElementById("loading").style.display = "none";
        alert("Failed to load inventory.");
      });
  }

  // 3. Add to Cart Logic
  function addToCart() {
    const itemName = document.getElementById("selectedItem").value.trim();
    const qty = parseInt(document.getElementById("selectedQty").value);

    if (!itemName || qty < 1) return alert("Please select a valid item and quantity.");

    // Check if item is already in cart, if so, just increase quantity
    const existingItemIndex = cart.findIndex(item => item.itemName === itemName);
    if (existingItemIndex > -1) {
      cart[existingItemIndex].qty += qty;
    } else {
      cart.push({ itemName: itemName, qty: qty });
    }

    // Reset inputs
    document.getElementById("selectedItem").value = "";
    document.getElementById("selectedQty").value = "1";
    renderCart();
  }

  function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
  }

  function renderCart() {
    const tbody = document.getElementById("cartBody");
    tbody.innerHTML = "";
    
    if (cart.length === 0) {
      document.getElementById("cartTable").style.display = "none";
      document.getElementById("checkoutBtn").style.display = "none";
      return;
    }

    cart.forEach((item, index) => {
      let tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${item.itemName}</td>
        <td>${item.qty}</td>
        <td><button class="btn btn-sm btn-danger" onclick="removeFromCart(${index})">X</button></td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById("cartTable").style.display = "table";
    document.getElementById("checkoutBtn").style.display = "block";
  }

  // 4. Submit the Entire Cart
  function submitCheckout() {
    if (cart.length === 0) return alert("Cart is empty.");
    
    const rollNo = document.getElementById("sRoll").innerText;
    document.getElementById("loading").style.display = "block";

    // Convert the cart array to a JSON string
    const cartDataString = JSON.stringify(cart);

    fetch(APPS_SCRIPT_URL + "?action=issueItems&rollNo=" + encodeURIComponent(rollNo) + "&cartData=" + encodeURIComponent(cartDataString))
      .then(res => res.json())
      .then(data => {
        document.getElementById("loading").style.display = "none";
        if (data.success) {
          alert("Success! " + data.message);
          document.getElementById("issueSection").style.display = "none";
          cart = []; // clear cart
        } else {
          alert("Error: " + data.message);
        }
      })
      .catch(err => {
        document.getElementById("loading").style.display = "none";
        alert("Failed to issue items.");
      });
  }
</script>
</body>
</html>
