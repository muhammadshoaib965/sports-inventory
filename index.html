<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sports System</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff}
.container{padding:20px}
input,select,button{padding:8px;margin:5px}
.low{background:#7f1d1d}
</style>
</head>

<body>
<div class="container">

<h2>Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">

<h3>Issue Item</h3>
<input id="roll" placeholder="Roll No">
<select id="items"></select>
<input id="qty" type="number" placeholder="Qty">
<button onclick="issue()">Issue</button>

<h3>Return Item</h3>
<input id="rroll" placeholder="Roll No">
<select id="condition">
<option>Good</option>
<option>Damaged</option>
<option>Lost</option>
</select>
<button onclick="ret()">Return</button>

<h3>Inventory</h3>
<table border="1" width="100%">
<thead><tr><th>Name</th><th>Available</th></tr></thead>
<tbody id="inv"></tbody>
</table>

</div>
</div>

<script>
const URL = "PASTE_WEB_APP_URL";
const KEY = "FAST_API_KEY_123";

let items=[];

async function api(action,data={}){
let r=await fetch(URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({apiKey:KEY,action,...data})
});
return await r.json();
}

async function login(){
let u=user.value,p=pass.value;
let r=await api("login",{user:u,pass:p});
if(r.status=="success"){
panel.style.display="block";
load();
}else alert("Login failed");
}

async function load(){
let r=await api("getInventory");
items=r.data;
let h="",opt="";
items.forEach(i=>{
h+=`<tr class="${i.available<3?'low':''}"><td>${i.name}</td><td>${i.available}</td></tr>`;
opt+=`<option value="${i.id}">${i.name}</option>`;
});
inv.innerHTML=h;
itemsSel.innerHTML=opt;
}

async function issue(){
let roll=document.getElementById("roll").value;
let itemId=itemsSel.value;
let qty=parseInt(document.getElementById("qty").value);
let r=await api("issue",{roll,itemId,qty});
alert(r.message);
load();
}

async function ret(){
let roll=document.getElementById("rroll").value;
let condition=document.getElementById("condition").value;
let r=await api("return",{roll,condition});
alert(r.message);
load();
}
</script>
</body>
</html>
